<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liên Hệ | Quang Đại Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <div class="logo">QD.</div>
        <ul>
          <li><a href="index.html">Trang Chủ</a></li>
          <li><a href="about.html">Giới Thiệu</a></li>
          <li><a href="contact.html">Liên Hệ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section>
      <div class="animate" style="text-align: center; margin-bottom: 4rem;">
        <h2 style="font-size: 3.5rem; margin-bottom: 1rem; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Kết Nối Với Tôi.</h2>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Bạn có dự án mới hay chỉ muốn gửi lời chào?</p>
      </div>

      <div class="contact-form glass animate" style="animation-delay: 0.2s;">
        <form id="portfolio-contact">
          <div class="form-group">
            <label for="name">Tên Của Bạn</label>
            <input type="text" id="name" name="name" placeholder="Nguyễn Văn A" required>
          </div>
          <div class="form-group">
            <label for="email">Địa Chỉ Email</label>
            <input type="email" id="email" name="email" placeholder="email@vi-du.com" required>
          </div>
          <div class="form-group">
            <label for="message">Lời Nhắn</label>
            <textarea id="message" name="message" rows="5" placeholder="Hãy kể cho tôi nghe về dự án của bạn..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Gửi Tin Nhắn</button>
        </form>
        <div id="form-success" style="display: none; text-align: center; padding: 2rem; color: var(--secondary);">
          <h3>Đã Gửi Tin Nhắn!</h3>
          <p>Cảm ơn bạn đã liên hệ. Tôi sẽ phản hồi sớm nhất có thể.</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="container">
    <p>&copy; 2026 Quang Đại Portfolio. Được thiết kế với tâm huyết.</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
